name: Deploy to OVH

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-ovh-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build front assets
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to OVH via lftp
        run: |
          lftp -e "
            set ssl:verify-certificate no;
            open -u ${{ secrets.OVH_FTP_USERNAME }},${{ secrets.OVH_FTP_PASSWORD }} ${{ secrets.OVH_FTP_SERVER }};
            mirror -R \
              --verbose \
              --exclude-glob .git* \
              --exclude-glob node_modules \
              --exclude-glob .github \
              --exclude-glob tests \
              --exclude-glob .env \
              --exclude-glob storage/logs \
              --exclude-glob storage/framework/cache \
              --exclude-glob storage/framework/sessions \
              --exclude-glob storage/framework/views \
              ./ /landing-page/;
            bye
          "